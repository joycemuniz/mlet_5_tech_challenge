services:
  # ── FastAPI – API de Score ─────────────────────────────────────────────────
  - type: web
    name: mlet5-api
    runtime: python
    region: ohio
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"

  # ── Streamlit – Dashboard ──────────────────────────────────────────────────
  - type: web
    name: mlet5-app
    runtime: python
    region: ohio
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: >
      streamlit run src/app/Home.py
      --server.port $PORT
      --server.address 0.0.0.0
      --server.enableCORS false
      --server.enableXsrfProtection false
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
