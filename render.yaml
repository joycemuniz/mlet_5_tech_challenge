services:
  - type: web
    name: mlet-score-api
    env: python
    plan: free
    region: oregon
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn src.api.app:app --host 0.0.0.0 --port $PORT"
    disk: 1
    envVars:
      - key: PROMETHEUS_PUSHGATEWAY
        value: ""
    mounts: []
    autoDeploy: true
